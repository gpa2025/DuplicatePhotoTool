<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconAccent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099cc;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="256" height="256" fill="url(#iconGradient)" rx="32"/>

  <!-- Duplicate Photo Icon -->
  <g transform="translate(45, 45)">
    <!-- First Photo Frame -->
    <rect x="0" y="0" width="100" height="100" fill="none" stroke="url(#iconAccent)" stroke-width="4" rx="8"/>
    <line x1="0" y1="20" x2="100" y2="20" stroke="url(#iconAccent)" stroke-width="3"/>
    <circle cx="25" cy="50" r="12" fill="url(#iconAccent)"/>
    <polygon points="75,80 100,45 100,80" fill="url(#iconAccent)" opacity="0.8"/>

    <!-- Second Photo Frame (overlapped) -->
    <rect x="35" y="35" width="100" height="100" fill="none" stroke="url(#iconAccent)" stroke-width="4" rx="8" opacity="0.6"/>
    <line x1="35" y1="55" x2="135" y2="55" stroke="url(#iconAccent)" stroke-width="3" opacity="0.6"/>
    <circle cx="60" cy="85" r="12" fill="url(#iconAccent)" opacity="0.6"/>
    <polygon points="110,115 135,80 135,115" fill="url(#iconAccent)" opacity="0.4"/>

    <!-- Checkmark overlay -->
    <g transform="translate(95, 90)">
      <circle cx="0" cy="0" r="18" fill="#10b981"/>
      <path d="M -8,0 L -2,6 L 8,-3" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
