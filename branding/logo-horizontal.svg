<svg viewBox="0 0 600 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hGradBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hGradAccent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099cc;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="600" height="150" fill="url(#hGradBg)"/>

  <!-- Icon -->
  <g transform="translate(15, 25)">
    <!-- First Photo -->
    <rect x="0" y="0" width="50" height="50" fill="none" stroke="url(#hGradAccent)" stroke-width="2.5" rx="4"/>
    <line x1="0" y1="12" x2="50" y2="12" stroke="url(#hGradAccent)" stroke-width="1.5"/>
    <circle cx="15" cy="28" r="6" fill="url(#hGradAccent)"/>
    <polygon points="40,45 50,30 50,45" fill="url(#hGradAccent)" opacity="0.8"/>

    <!-- Second Photo -->
    <rect x="18" y="18" width="50" height="50" fill="none" stroke="url(#hGradAccent)" stroke-width="2.5" rx="4" opacity="0.6"/>
    <line x1="18" y1="30" x2="68" y2="30" stroke="url(#hGradAccent)" stroke-width="1.5" opacity="0.6"/>
    <circle cx="33" cy="46" r="6" fill="url(#hGradAccent)" opacity="0.6"/>
    <polygon points="58,63 68,48 68,63" fill="url(#hGradAccent)" opacity="0.4"/>

    <!-- Checkmark -->
    <g transform="translate(50, 48)">
      <circle cx="0" cy="0" r="10" fill="#10b981"/>
      <path d="M -4,0 L -1,3 L 4,-1" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Text -->
  <g transform="translate(120, 35)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#00d9ff" letter-spacing="1">
      GPA SOLUTIONS
    </text>
    <text x="0" y="35" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#0f172a" letter-spacing="0.5">
      DPT
    </text>
    <text x="0" y="55" font-family="Arial, sans-serif" font-size="11" fill="#64748b">
      Duplicate Photo Tool
    </text>
  </g>

  <!-- Accent line -->
  <line x1="15" y1="90" x2="585" y2="90" stroke="url(#hGradAccent)" stroke-width="1.5"/>
</svg>
