<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Monochrome icon without gradient - for printing/grayscale -->
  <defs>
    <style>
      .mono-dark { fill: #1e293b; stroke: #0f172a; }
      .mono-light { fill: #f1f5f9; stroke: #cbd5e1; }
      .mono-accent { fill: none; stroke: #0f172a; stroke-width: 3; }
    </style>
  </defs>

  <!-- Square background -->
  <rect width="256" height="256" fill="#f1f5f9" rx="32"/>

  <!-- Duplicate Photo Icon (dark on light) -->
  <g transform="translate(48, 48)">
    <!-- First Photo Frame -->
    <rect x="0" y="0" width="100" height="100" class="mono-accent" rx="8"/>
    <line x1="0" y1="20" x2="100" y2="20" class="mono-accent"/>
    <circle cx="25" cy="50" r="12" class="mono-dark" stroke-width="0"/>
    <polygon points="75,80 100,45 100,80" class="mono-dark" stroke-width="0" opacity="0.7"/>

    <!-- Second Photo Frame (overlapped) -->
    <rect x="35" y="35" width="100" height="100" class="mono-accent" rx="8" opacity="0.5"/>
    <line x1="35" y1="55" x2="135" y2="55" class="mono-accent" opacity="0.5"/>
    <circle cx="60" cy="85" r="12" class="mono-dark" stroke-width="0" opacity="0.5"/>
    <polygon points="110,115 135,80 135,115" class="mono-dark" stroke-width="0" opacity="0.3"/>

    <!-- Checkmark overlay -->
    <g transform="translate(95, 90)">
      <circle cx="0" cy="0" r="18" fill="#0f172a"/>
      <path d="M -8,0 L -2,6 L 8,-3" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Text underneath -->
  <text x="128" y="240" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0f172a" text-anchor="middle" letter-spacing="1">
    DPT
  </text>
</svg>
