<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Favicon - Small icon format -->
  <defs>
    <linearGradient id="favGradBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="favGradAccent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099cc;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="128" height="128" fill="url(#favGradBg)" rx="16"/>

  <!-- Duplicate Photo Icon -->
  <g transform="translate(20, 20)">
    <!-- First Photo -->
    <rect x="0" y="0" width="50" height="50" fill="none" stroke="url(#favGradAccent)" stroke-width="2" rx="4"/>
    <line x1="0" y1="10" x2="50" y2="10" stroke="url(#favGradAccent)" stroke-width="1.5"/>
    <circle cx="12" cy="28" r="5" fill="url(#favGradAccent)"/>
    <polygon points="38,45 50,30 50,45" fill="url(#favGradAccent)" opacity="0.8"/>

    <!-- Second Photo -->
    <rect x="14" y="14" width="50" height="50" fill="none" stroke="url(#favGradAccent)" stroke-width="2" rx="4" opacity="0.6"/>
    <line x1="14" y1="24" x2="64" y2="24" stroke="url(#favGradAccent)" stroke-width="1.5" opacity="0.6"/>
    <circle cx="26" cy="42" r="5" fill="url(#favGradAccent)" opacity="0.6"/>
    <polygon points="52,59 64,44 64,59" fill="url(#favGradAccent)" opacity="0.4"/>

    <!-- Checkmark -->
    <g transform="translate(48, 44)">
      <circle cx="0" cy="0" r="8" fill="#10b981"/>
      <path d="M -3,0 L 0,2 L 3,-1" stroke="white" stroke-width="1" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
